# ================================================
# 7 Days to Die + Darkness Falls - Docker Compose
# ベースイメージ: vinanrra/7dtd-server (LinuxGSM)
# ================================================
# 特徴:
#   - Darkness Falls を環境変数で自動インストール
#   - 自動バックアップ・クラッシュ時の自動再起動
#   - Alloc Fixes（Web管理）も自動インストール
#   - 全データを 7dtd-docker フォルダ内に永続化
# 使い方:
#   1. docker compose up -d  （初回は10〜20分かかる）
#   2. docker compose logs -f で進捗確認
#   3. 起動後、serverfiles/sdtdserver.xml を編集してサーバー設定
# ================================================

services:
  7dtd:
    image: vinanrra/7dtd-server:latest
    container_name: 7dtd-server
    restart: unless-stopped

    environment:
      # ---- 必須 ----
      START_MODE: "1"              # 1=通常起動, 4=shell起動（メンテ用）
      # 7DTD本体のSteamブランチ。
      # 注意: "stable"/"public" は常に最新安定版（現在は2.6）を指すため、
      # DF V6（1.4専用）を使う場合は必ず "v1.4" を指定してバージョン固定する。
      # 他のブランチ名は https://api.steamcmd.net/v1/info/251570 で確認可能。
      VERSION: "v1.4"
      PUID: "1000"
      PGID: "1000"
      TimeZone: "Asia/Tokyo"

      # ---- Darkness Falls ----
      # ※v1.4を選択していれば自動的にv6が選択される 
      UPDATE_MODS: "NO"            # MODの自動更新
      DARKNESS_FALLS: "YES"        # Darkness Falls
      DARKNESS_FALLS_UPDATE: "NO"  # Dakrness Fallsの自動更新

      # ---- 管理機能 ----
      BACKUP: "YES"                # バックアップの有効か
      BACKUP_HOUR: "5"             # 毎日5時に自動バックアップ
      BACKUP_MAX: "7"              # 最大7個保持
      MONITOR: "YES"               # クラッシュ時の自動再起動

    ports:
      # ゲーム接続用（ポート開放が必要）
      - "26900:26900/tcp"
      - "26900:26900/udp"
      - "26901:26901/udp"
      - "26902:26902/udp"
      # telnet管理（ローカルからのみアクセス）
      # docker exec でも代替可。不要なら削除してOK
      - "127.0.0.1:8081:8081/tcp"

    volumes:
      # サーバー本体ファイル（MODもここに自動配置される）
      # serverfiles/Mods/ に追加MODを手動で入れることも可能
      # serverfiles/sdtdserver.xml でサーバー設定を編集
      - ./serverfiles:/home/sdtdserver/serverfiles
      # セーブデータ・生成ワールド
      - ./savedata:/home/sdtdserver/.local/share/7DaysToDie
      # LinuxGSM の設定（common.cfg など）
      - ./lgsm-config:/home/sdtdserver/lgsm/config-lgsm/sdtdserver
      # 自動バックアップの保存先
      - ./backups:/home/sdtdserver/lgsm/backup
      # ログ
      - ./logs:/home/sdtdserver/log

    # LinuxGSMの推奨設定
    ulimits:
      nofile:
        soft: 10240
        hard: 10240